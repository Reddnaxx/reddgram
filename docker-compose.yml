services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: file:/data/dev.db
      JWT_SECRET: ${JWT_SECRET:-change-me-at-least-8-chars}
      NODE_ENV: production
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      PORT: "3000"
    volumes:
      - sqlite_data:/data
    expose:
      - "3000"

  nginx:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  sqlite_data:
