<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="icon"
      type="image/svg+xml"
      href="/favicon.svg"
    />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>reddgram</title>
    <script>
      ;(function () {
        try {
          var key = 'reddgram-color-scheme'
          var raw = localStorage.getItem(key)
          var mode =
            raw === 'light' || raw === 'dark' || raw === 'auto' ? raw : 'auto'
          var prefersDark = window.matchMedia(
            '(prefers-color-scheme: dark)',
          ).matches
          var dark = mode === 'dark' || (mode === 'auto' && prefersDark)
          document.documentElement.classList.toggle('dark', dark)
        } catch (_) {}
      })()
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script
      type="module"
      src="/src/main.ts"
    ></script>
  </body>
</html>
